<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Teal orbit logo</title>
  <desc id="desc">A teal circular orbit logo with one large central circle and one smaller circle on the right side of the outer ring.</desc>
  <defs>
    <linearGradient id="tealGradient" x1="220" y1="180" x2="980" y2="1020" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#42c8bd"/>
      <stop offset="0.5" stop-color="#25bdb8"/>
      <stop offset="1" stop-color="#20a89e"/>
    </linearGradient>
  </defs>

  <!-- Outer orbit ring -->
  <circle cx="600" cy="600" r="410"
          fill="none"
          stroke="url(#tealGradient)"
          stroke-width="32"/>

  <!-- Central filled circle -->
  <circle cx="600" cy="600" r="155"
          fill="url(#tealGradient)"/>

  <!-- Orbiting right dot -->
  <circle cx="1010" cy="600" r="58"
          fill="url(#tealGradient)"/>
</svg>
