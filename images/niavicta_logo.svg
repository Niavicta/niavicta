<svg xmlns="http://www.w3.org/2000/svg" width="403" height="328" viewBox="0 0 403 328">
  <defs>
    <clipPath id="clip-left-grey">
      <circle cx="37" cy="281" r="31"/>
    </clipPath>
    <clipPath id="clip-right-grey">
      <circle cx="356" cy="281" r="31"/>
    </clipPath>
  </defs>

  <!-- Connecting lines -->
  <g fill="none" stroke="#A1D4CD" stroke-width="18" stroke-linecap="butt">
    <line x1="196.5" y1="48" x2="103" y2="169"/>
    <line x1="196.5" y1="48" x2="290" y2="169"/>
    <line x1="103" y1="169" x2="196.5" y2="280"/>
    <line x1="290" y1="169" x2="196.5" y2="280"/>
    <line x1="103" y1="169" x2="37" y2="281"/>
    <line x1="290" y1="169" x2="356" y2="281"/>
  </g>

  <!-- Outer lower nodes -->
  <circle cx="37" cy="281" r="31" fill="#60748D"/>
  <circle cx="356" cy="281" r="31" fill="#60748D"/>

  <!-- Dark connector portions visible within lower nodes -->
  <g fill="none" stroke="#516D85" stroke-width="18" stroke-linecap="butt">
    <line x1="103" y1="169" x2="37" y2="281" clip-path="url(#clip-left-grey)"/>
    <line x1="290" y1="169" x2="356" y2="281" clip-path="url(#clip-right-grey)"/>
  </g>

  <!-- Main nodes -->
  <circle cx="196.5" cy="48" r="46" fill="#50B2A1"/>
  <circle cx="103" cy="169" r="36" fill="#203B60"/>
  <circle cx="290" cy="169" r="36" fill="#203B60"/>
  <circle cx="196.5" cy="280" r="46" fill="#50B2A1"/>
</svg>
