document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0%, transparent 88%);\n  z-index: 0;\n}\n/* .viz-grid sits behind everything (z-index:0). Other children stack in\n   document order on top of it. Children that need explicit positioning\n   declare it themselves; we don't apply a blanket position:relative\n   because some children (.viz-sys, .viz-band, .viz-event__center, etc.)\n   intentionally use position:absolute. */\n.viz-line {\n  fill: none;\n  stroke: rgba(14,34,64,.36);\n  stroke-width: 1.2;\n  stroke-dasharray: 6 5;\n}\n.viz-line--broken {\n  stroke: var(--gold);\n  stroke-width: 1.6;\n  stroke-dasharray: 3 4;\n}\n\n/* Mono labels used by many viz blocks */\n.viz [class*=\"viz-\"] span,\n.viz [class*=\"viz-\"] em {\n  font-family: var(--font-mono);\n}\n\n/* ─── V01 · Fragmentation ─── */\n.viz-frag { display: block; height: 100%; }\n.viz-frag__lines {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  pointer-events: none;\n}\n.viz-sys {\n  position: absolute;\n  top: 14px;\n  width: 70px;\n  padding: 7px 8px 8px;\n  background: var(--surface);\n  border: 1px solid var(--line-strong);\n  display: grid;\n  gap: 2px;\n}\n.viz-sys::before {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; top: 0;\n  height: 2px;\n  background: var(--teal);\n}\n.viz-sys--alt { top: 38px; }\n.viz-sys--alt::before { background: var(--gold); }\n.viz-sys span {\n  font-size: 7.5px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted);\n  display: block;\n}\n.viz-sys b {\n  font-family: var(--font);\n  font-size: 13px;\n  line-height: 1;\n  color: var(--ink);\n  font-weight: 650;\n}\n.viz-sys em {\n  font-style: normal;\n  font-size: 9.5px;\n  color: var(--ink-soft);\n  display: block;\n  margin-top: 2px;\n}\n.viz-band {\n  position: absolute;\n  left: 6%; right: 6%;\n  bottom: 56px;\n  padding: 12px 12px 10px;\n  border: 1px dashed var(--line-strong);\n  background: rgba(14,34,64,.04);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 6px;\n  flex-wrap: wrap;\n}\n.viz-band__title {\n  position: absolute;\n  top: -7px;\n  left: 12px;\n  padding: 0 6px;\n  background: var(--bg-warm);\n  font-size: 8px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n.viz-band > span,\n.viz-band > b {\n  font-size: 8.5px;\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  padding: 4px 6px;\n  border: 1px solid var(--line);\n  background: var(--surface);\n  color: var(--muted);\n  font-weight: 500;\n}\n.viz-band > b {\n  border-color: rgba(214,162,76,.6);\n  background: rgba(214,162,76,.12);\n  color: #8a6a25;\n}\n.viz-foot {\n  position: absolute;\n  left: 6%; right: 6%;\n  bottom: 12px;\n  padding-top: 10px;\n  border-top: 1px solid var(--line);\n  display: flex;\n  justify-content: space-between;\n  gap: 8px;\n  font-size: 8.5px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n\n/* ─── V02 · Hidden overcommitment ─── */\n.viz-cap { padding: 6px 4px; gap: 8px; }\n.viz-cap__row {\n  display: grid;\n  grid-template-columns: 56px 1fr 44px;\n  gap: 10px;\n  align-items: center;\n}\n.viz-cap__sys {\n  font-size: 10px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--ink);\n  font-weight: 600;\n}\n.viz-cap__bar {\n  height: 10px;\n  background: rgba(14,34,64,.08);\n  position: relative;\n  overflow: hidden;\n}\n.viz-cap__bar i {\n  display: block;\n  height: 100%;\n  background: var(--teal);\n}\n.viz-cap__bar i[style*=\"100%\"] { background: var(--gold); }\n.viz-cap__val {\n  font-size: 11px;\n  font-family: var(--font-mono);\n  color: var(--ink-soft);\n  text-align: right;\n}\n.viz-cap__total {\n  margin-top: 10px;\n  padding: 14px 16px;\n  border: 1px solid var(--line-strong);\n  background: var(--surface);\n  display: grid;\n  gap: 4px;\n}\n.viz-cap__kicker {\n  font-size: 9.5px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--gold);\n}\n.viz-cap__total b {\n  font-family: var(--font);\n  font-size: 3 orm: uppercase;\n  color: var(--ink);\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-left: 2px solid var(--teal);\n  padding: 8px 10px 7px;\n}\n\n/* ─── V04 · Procedure unit ─── */\n.viz-procedure { gap: 10px; align-content: center !important; height: 100%; }\n.viz-procedure__title {\n  font-size: 10px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--gold);\n  font-family: var(--font-mono);\n}\n.viz-procedure__row {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1.2fr 1fr 1fr;\n  gap: 1px;\n  background: var(--line);\n  border: 1px solid var(--line-strong);\n}\n.viz-proc-cell {\n  background: var(--surface);\n  padding: 10px 10px 12px;\n  display: grid;\n  gap: 4px;\n  min-height: 80px;\n}\n.viz-proc-cell span {\n  font-size: 9px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--gold);\n}\n.viz-proc-cell b {\n  font-family: var(--font);\n  font-size: 11px;\n  line-height: 1.25;\n  color: var(--ink);\n  font-weight: 600;\n}\n.viz-proc-cell--main { background: rgba(14,34,64,.04); }\n.viz-proc-cell--main span { color: var(--teal); }\n.viz-procedure__examples {\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px;\n  margin-top: 4px;\n}\n.viz-procedure__examples span {\n  font-family: var(--font-mono);\n  font-size: 9.5px;\n  letter-spacing: .12em;\n  text-transform: uppercase;\n  color: var(--muted);\n  padding: 4px 8px;\n  background: rgba(14,34,64,.04);\n  border: 1px solid var(--line);\n}\n\n/* ─── V05 · One event many views ─── */\n.viz-event { height: 100%; }\n.viz-event__lines {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  pointer-events: none;\n}\n.viz-event__center {\n  position: absolute;\n  left: 50%;\n  top: 48%;\n  transform: translate(-50%, -50%);\n  width: 180px;\n  padding: 10px 12px;\n  background: var(--ink);\n  color: white;\n  display: grid;\n  gap: 3px;\n  text-align: center;\n}\n.viz-event__kicker {\n  font-size: 9px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--teal-soft) !important;\n}\n.viz-event__center b {\n  font-family: var(--font);\n  font-size: 14px;\n  letter-spacing: -.01em;\n}\n.viz-event__center em {\n  font-style: normal;\n  font-size: 9px;\n  color: rgba(255,255,255,.65);\n  letter-spacing: .04em;\n}\n.viz-view--pos {\n  position: absolute;\n  z-index: 2;\n}\n\n/* ─── V06 · Principal AI ─── */\n.viz-principal {\n  display: grid !important;\n  grid-template-columns: 1fr 1fr;\n  gap: 12px;\n  height: 100%;\n  align-content: stretch !important;\n}\n.viz-principal__lane {\n  background: var(--surface);\n  border: 1px solid var(--line-strong);\n  padding: 12px;\n  display: grid;\n  gap: 8px;\n  align-content: start;\n}\n.viz-principal__lane--ai {\n  border-left: 3px solid var(--teal);\n}\n.viz-principal__lane--human {\n  border-left: 3px solid var(--gold);\n}\n.viz-principal__head {\n  font-size: 9.5px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--gold);\n}\n.viz-principal__lane--ai .viz-principal__head { color: var(--teal); }\n.viz-principal__step {\n  border: 1px solid var(--line);\n  padding: 7px 9px;\n  display: grid;\n  gap: 2px;\n}\n.viz-principal__step span {\n  font-size: 8.5px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--muted);\n}\n.viz-principal__step b {\n  font-family: var(--font);\n  font-size: 12px;\n  color: var(--ink);\n  font-weight: 600;\n}\n\n/* ─── V07 · Project Zero ─── */\n.viz-zero {\n  display: grid !important;\n  grid-template-columns: 1.4fr 1fr;\n  gap: 14px;\n  height: 100%;\n  align-content: center !important;\n}\n.viz-zero__stack {\n  display: grid;\n  gap: 5px;\n}\n.viz-zero__q {\n  display: grid;\n  grid-template-columns: 28px 1fr;\n  gap: 8px;\n  padding: 7px 10px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n}\n.viz-zero__q span {\n  font-size: 10px;\n  font-family: var(--font-mono);\n  color: var(--gold);\n  align-self: center;\n  font-weight: 600;\n}\n.viz-zero__q b {\n  font-family: var(--font);\n  font-size: 11.5px;\n  color: var(--ink);\n  font-weight: 600;\n}\n.viz-zero__q em {\n  grid-column: 2;\n  font-style: normal;\n  font-size: 9.5px;\n  color: var(--muted);\n  letter-spacing: .04em;\n}\n.viz-zero__out {\n  align-self: center;\n  padding: 14px;\n  background: var(--ink);\n  color: white;\n  display: grid;\n  gap: 6px;\n}\n.viz-zero__out span {\n  font-size: 9px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--teal-soft);\n}\n.viz-zero__out b {\n  font-family: var(--font);\n  font-size: 18px;\n  letter-spacing: -.015em;\n  line-height: 1.15;\n}\n\n/* ─── V08 · Configuration cascade ─── */\n.viz-cascade {\n  display: grid !important;\n  gap: 4px;\n  align-content: center !important;\n  height: 100%;\n}\n.viz-cascade__row {\n  display: grid;\n  grid-template-columns: 110px 180px 1fr;\n  gap: 14px;\n  align-items: center;\n  padding: 10px 12px;\n  background: var(--surface);\n  border: 1px solid var(--line);\n  position: relative;\n}\n.viz-cascade__row::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 0; bottom: 0;\n  width: 3px;\n  background: var(--teal);\n  opacity: .55;\n}\n.viz-cascade__row:nth-child(2)::before { opacity: .7; }\n.viz-cascade__row:nth-child(3)::before { opacity: .85; }\n.viz-cascade__row:nth-child(4)::before { opacity: 1; background: var(--gold); }\n.viz-cascade__row:nth-child(5)::before { opacity: 1; background: var(--ink); }\n.viz-cascade__row span {\n  font-size: 9.5px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--gold);\n  font-weight: 600;\n}\n.viz-cascade__row b {\n  font-family: var(--font);\n  font-size: 13px;\n  color: var(--ink);\n  font-weight: 600;\n}\n.viz-cascade__row em {\n  font-style: normal;\n  font-size: 11px;\n  color: var(--muted);\n  line-height: 1.4;\n  font-family: var(--font);\n}\n\n/* ─── V09 · Three scales ─── */\n.viz-scales {\n  display: grid !important;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 10px;\n  height: 100%;\n  align-content: stretch !important;\n}\n.viz-scale {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  padding: 12px;\n  display: grid;\n  gap: 6px;\n  align-content: start;\n  border-top: 3px solid var(--teal);\n}\n.viz-scale--s2 { border-top-color: var(--gold); }\n.viz-scale--s3 { border-top-color: var(--ink); }\n.viz-scale__stage {\n  font-size: 9.5px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: var(--gold);\n  font-weight: 600;\n}\n.viz-scale b {\n  font-family: var(--font);\n  font-size: 13px;\n  color: var(--ink);\n  font-weight: 650;\n}\n.viz-scale ul {\n  list-style: none;\n  margin: 4px 0;\n  padding: 6px 0 0;\n  border-top: 1px solid var(--line);\n  display: grid;\n  gap: 3px;\n}\n.viz-scale li {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  color: var(--ink-soft);\n}\n.viz-scale li span:first-child {\n  color: var(--muted);\n  letter-spacing: .1em;\n  text-transform: uppercase;\n  font-size: 9px;\n  align-self: center;\n}\n.viz-scale em {\n  font-style: normal;\n  font-size: 10px;\n  color: var(--muted);\n  margin-top: 2px;\n}\n\n/* ─── V10 · Module packs ─── */\n.viz-modules {\n  display: grid !important;\n  grid-template-rows: auto 1fr;\n  gap: 12px;\n  height: 100%;\n  align-content: center !important;\n}\n.viz-modules__core {\n  background: var(--ink);\n  color: white;\n  padding: 12px 16px;\n  display: grid;\n  gap: 4px;\n}\n.viz-modules__core span {\n  font-size: 9.5px;\n  letter-spacing: .2em;\n  text-transform: uppercase;\n  color: var(--teal-soft);\n}\n.viz-modules__core b {\n  font-family: var(--font);\n  font-size: 13.5px;\n  letter-spacing: -.005em;\n  font-weight: 600;\n}\n.viz-modules__packs {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 6px;\n}\n.viz-pack {\n  background: var(--surface);\n  border: 1px solid var(--line);\n  border-left: 2px solid var(--teal);\n  padding: 8px 10px;\n  display: grid;\n  gap: 2px;\n}\n.viz-pack--new { border-left-color: var(--gold); background: rgba(214,162,76,.08); }\n.viz-pack--off { opacity: .55; }\n.viz-pack span {\n  font-size: 8.5px;\n  letter-spacing: .14em;\n  text-transform: uppercase;\n  color: var(--gold);\n}\n.viz-pack b {\n  font-family: var(--font);\n  font-size: 11.5px;\n  color: var(--ink);\n  font-weight: 600;\n}\n.viz-pack em {\n  font-style: normal;\n  font-size: 9.5px;\n  color: var(--muted);\n  letter-spacing: .03em;\n}\n\n/* Tighter on small screens */\n@media (max-width: 760px) {\n  .visual-embed.viz-slot { height: auto; padding: 14px; min-height: 320px; }\n  .viz-procedure__row { grid-template-columns: 1fr 1fr; }\n  .viz-cascade__row { grid-template-columns: 1fr; gap: 4px; }\n  .viz-modules__packs { grid-template-columns: 1fr 1fr; }\n  .viz-canonical, .viz-zero, .viz-principal, .viz-scales { grid-template-columns: 1fr !important; }\n}\n\n\n/* ──────────────────────────────────────────────────────────\n   Work-with-us hero — navy panel with nianav OS lockup card.\n   Replaces the older light .work-signal block on\n   niavicta-os-work-with-us.html so the nianav OS mark sits on\n   a navy ground with proper contrast.\n   ────────────────────────────────────────────────────────── */\n.work-hero--dark {\n  background: var(--ink-deep);\n  color: rgba(255,255,255,.76);\n  border-bottom: 1px solid rgba(255,255,255,.08);\n  position: relative;\n  overflow: hidden;\n  isolation: isolate;\n}\n.work-hero--dark .work-hero__pattern {\n  position: absolute;\n  inset: 0;\n  z-index: 0;\n  pointer-events: none;\n  background-image:\n    linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);\n  background-size: 56px 56px;\n  mask-image: radial-gradient(ellipse at 78% 28%, black 0%, transparent 68%);\n  -webkit-mask-image: radial-gradient(ellipse at 78% 28%, black 0%, transparent 68%);\n}\n.work-hero--dark .container { position: relative; z-index: 1; }\n.work-hero--dark .eyebrow {\n  color: rgba(255,255,255,.82);\n}\n.work-hero--dark .eyebrow::before {\n  background: var(--teal);\n}\n.work-hero--dark h1 { color: white; }\n.work-hero--dark h1 .teal { color: var(--teal-bright); }\n.work-hero--dark .lede { color: rgba(255,255,255,.72); }\n.work-hero--dark .btn-primary {\n  background: white;\n  color: var(--ink);\n}\n.work-hero--dark .btn-primary:hover { background: var(--bg-warm); }\n.work-hero--dark .btn-ghost {\n  color: white;\n  border-color: rgba(255,255,255,.32);\n}\n.work-hero--dark .btn-ghost:hover { background: rgba(255,255,255,.09); }\n\n.work-lockup {\n  position: relative;\n  min-height: 470px;\n  border: 1px solid rgba(255,255,255,.12);\n  background:\n    radial-gradient(circle at 28% 30%, rgba(79,179,162,.22), transparent 52%),\n    radial-gradient(circle at 80% 78%, rgba(214,162,76,.10), transparent 55%),\n    linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.015));\n  display: grid;\n  place-items: center;\n  overflow: hidden;\n  box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 24px 60px rgba(0,0,0,.22);\n}\n.work-lockup__rings {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  place-items: center;\n  pointer-events: none;\n}\n.work-lockup__rings span {\n  position: absolute;\n  border-radius: 50%;\n  border: 1px solid rgba(255,255,255,.10);\n  display: block;\n}\n.work-lockup__rings span:nth-child(1) { width: 420px; height: 420px; border-style: dashed; opacity: .55; }\n.work-lockup__rings span:nth-child(2) { width: 280px; height: 280px; }\n.work-lockup__rings span:nth-child(3) {\n  width: 160px;\n  height: 160px;\n  border-color: rgba(79,179,162,.42);\n  box-shadow: 0 0 60px rgba(79,179,162,.18);\n}\n.work-lockup__mark {\n  position: relative;\n  z-index: 2;\n  display: grid;\n  place-items: center;\n  padding: 24px 28px;\n}\n.work-lockup__mark img {\n  display: block;\n  width: 240px;\n  height: auto;\n  filter: drop-shadow(0 14px 36px rgba(8,21,41,.55));\n  /* The logo SVG has unstyled .ring and .teal classes — its own\n     XML markup will use teal accent + grey wordmark on its own.\n     We don't try to override it here. */\n}\n.work-lockup__tags {\n  position: absolute;\n  z-index: 3;\n  left: 22px;\n  right: 22px;\n  bottom: 20px;\n  display: flex;\n  justify-content: space-between;\n  gap: 14px;\n  font-family: var(--font-mono);\n  font-size: 10px;\n  letter-spacing: .18em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,.62);\n}\n.work-lockup__tags span {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.work-lockup__tags i {\n  width: 6px;\n  height: 6px;\n  border-radius: 50%;\n  background: var(--teal);\n  box-shadow: 0 0 0 4px rgba(79,179,162,.18);\n  display: block;\n}\n\n@media (max-width: 1000px) {\n  .work-lockup { min-height: 360px; }\n  .work-lockup__rings span:nth-child(1) { width: 320px; height: 320px; }\n  .work-lockup__rings span:nth-child(2) { width: 220px; height: 220px; }\n  .work-lockup__mark img { width: 200px; }\n}\n@media (max-width: 640px) {\n  .work-lockup__mark img { width: 168px; }\n  .work-lockup__tags { font-size: 9px; }\n}\n\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"stage-bg\"><\u002Fdiv>\n<nav class=\"top\">\n  <a class=\"brand\" href=\"index.html\" aria-label=\"Niavicta � nianav OS home\">\n    <img class=\"brand-logo\" src=\"images/niavicta_logo.svg\" alt=\"Niavicta logo\">\n    Niavicta <span class=\"product\"><b>nianav<\u002Fb> OS<\u002Fspan>\n  <\u002Fa>\n  <div class=\"links\">\n    <div class=\"nav-dropdown\">\n      <a class=\"nav-drop-trigger\" href=\"niavicta-os.html\" aria-haspopup=\"true\">nianav OS<\u002Fa>\n      <div class=\"nav-menu\" role=\"menu\">\n        <div class=\"nav-menu__group\">\n          <div class=\"nav-menu__nested\">\n            <a href=\"niavicta-os.html#problem\" role=\"menuitem\">The problem<\u002Fa>\n            <a href=\"niavicta-os.html#visual-model\" role=\"menuitem\">Visual model<\u002Fa>\n            <a href=\"niavicta-os.html#how-it-works\" role=\"menuitem\">How it works<\u002Fa>\n            <a href=\"niavicta-os.html#why\" role=\"menuitem\">Why it was built<\u002Fa>\n            <a href=\"niavicta-os.html#who-its-for\" role=\"menuitem\">Who it’s for<\u002Fa>\n            <a href=\"niavicta-os-work-with-us.html\" role=\"menuitem\">Work with Us<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"nav-dropdown\">\n      <a class=\"nav-drop-trigger\" href=\"software.html\" aria-haspopup=\"true\">Software<\u002Fa>\n      <div class=\"nav-menu\" role=\"menu\">\n        <div class=\"nav-menu__group\">\n          <a class=\"nav-menu__bar\" href=\"software.html\" role=\"menuitem\">What nianav OS replaces<\u002Fa>\n          <div class=\"nav-menu__nested\">\n            <a href=\"software.html#boundary\" role=\"menuitem\">The boundary<\u002Fa>\n            <a href=\"software.html#categories\" role=\"menuitem\">What comes inside<\u002Fa>\n            <a href=\"software.html#not-replace\" role=\"menuitem\">What stays outside<\u002Fa>\n            <a href=\"software.html#agentic\" role=\"menuitem\">AI governance<\u002Fa>\n            <a href=\"software.html#standards\" role=\"menuitem\">Standards &amp; regulation<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"nav-dropdown\">\n      <a class=\"nav-drop-trigger\" href=\"agentic-era.html\" aria-haspopup=\"true\">Agentic era<\u002Fa>\n      <div class=\"nav-menu\" role=\"menu\">\n        <div class=\"nav-menu__group\">\n          <a class=\"nav-menu__bar\" href=\"agentic-era.html\" role=\"menuitem\">The agentic era<\u002Fa>\n          <div class=\"nav-menu__nested\">\n            <a href=\"agentic-era.html#does\" role=\"menuitem\">What it does<\u002Fa>\n            <a href=\"agentic-era.html#why-now\" role=\"menuitem\">Why now<\u002Fa>\n            <a href=\"agentic-era.html#agentic\" role=\"menuitem\">Agentic governance<\u002Fa>\n            <a href=\"agentic-era.html#fit\" role=\"menuitem\">Who it is for<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"nav-dropdown\">\n      <a class=\"nav-drop-trigger\" href=\"about-us.html\" aria-haspopup=\"true\">About<\u002Fa>\n      <div class=\"nav-menu\" role=\"menu\">\n        <div class=\"nav-menu__group\">\n          <a class=\"nav-menu__bar\" href=\"about-us.html\" role=\"menuitem\">About Niavicta<\u002Fa>\n          <div class=\"nav-menu__nested\">\n            <a href=\"faq.html\" role=\"menuitem\">FAQs<\u002Fa>\n            <a href=\"privacy-policy.html\" role=\"menuitem\">Privacy<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <a class=\"cta\" href=\"mailto:hello@niavicta.com\">Start a conversation<\u002Fa>\n<\u002Fnav>\n<main>\n  <section class=\"hero work-hero work-hero--dark\">\n    <div class=\"work-hero__pattern\" aria-hidden=\"true\"><\u002Fdiv>\n    <div class=\"container hero-grid\">\n      <div>\n        <div class=\"eyebrow\">Work with us<\u002Fdiv>\n        <h1>Help shape the first version of <span class=\"teal\">nianav&nbsp;OS<\u002Fspan>.<\u002Fh1>\n        <p class=\"lede\">We are building a procedure-native operating system for regulated companies. It is specified, not shipped, and we want the first version shaped by the people who run, audit, and govern real operations.<\u002Fp>\n        <div class=\"btn-row\">\n          <a class=\"btn-primary\" href=\"mailto:hello@niavicta.com?subject=Working%20with%20Niavicta%20on%20nianav%20OS\">Talk to us <span class=\"arrow\"><\u002Fspan><\u002Fa>\n          <a class=\"btn-ghost\" href=\"#partners\">Who we are looking for<\u002Fa>\n          <a class=\"btn-ghost\" href=\"niavicta-os.html\">Back to nianav OS<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"work-lockup\" aria-hidden=\"true\">\n        <div class=\"work-lockup__rings\">\n          <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"work-lockup__mark\">\n          <img src=\"8cc2a794-33f7-458a-8ba9-39db751ea5fe\" alt=\"\">\n        <\u002Fdiv>\n        <div class=\"work-lockup__tags\">\n          <span><i><\u002Fi>v0 · spec phase<\u002Fspan>\n          <span>Utrecht · 2026<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section compact\">\n    <div class=\"container\">\n      <div class=\"section-mark\">\n        <span class=\"label\">The shape<\u002Fspan>\n        <span class=\"desc\">For teams where regulated work has outgrown the tool stack.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"split\">\n        <h2>If you run operations at a regulated scale-up, this will feel familiar.<\u002Fh2>\n        <div class=\"copy\">\n          <p>The quality system lives in one tool. The actual work happens in five others.<\u002Fp>\n          <p>Evidence gets assembled by hand the week before an audit. When someone leaves, the context leaves with them. AI is entering operational decisions, and no one can say cleanly where it touched the work or who was accountable.<\u002Fp>\n          <p><b>Those are not five problems. They are one:<\u002Fb> the tools do not share a model of the work, so the operation cannot show its own state.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section warm\">\n    <div class=\"container\" style=\"font-family: 'DM Sans'\">\n      <div class=\"section-mark\">\n        <span class=\"label\">What we are building<\u002Fspan>\n        <span class=\"desc\">A connected operating model for procedure-native work.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"proof-grid work-proof\">\n        <article class=\"proof-card\">\n          <h3>Procedure-native<\u002Fh3>\n          <p>Procedures are not documents beside the work. They are the structure that routes work, creates records, and preserves context.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"proof-card\">\n          <h3>Audit trail by default<\u002Fh3>\n          <p>Every step keeps the owner, time, record, decision, and rule together so evidence does not become a separate project.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"proof-card\">\n          <h3>AI with accountability<\u002Fh3>\n          <p>Agentic execution sits inside named human accountability, permitted scope, review, and traceability.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section\" id=\"partners\">\n    <div class=\"container\">\n      <div class=\"section-mark\">\n        <span class=\"label\">Who we want to hear from<\u002Fspan>\n        <span class=\"desc\">Design partners and advisors for the first version.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"card-grid cols-2 partner-grid\">\n        <article class=\"card partner-card\">\n          <span class=\"num\">01<\u002Fspan>\n          <h3>Design partners<\u002Fh3>\n          <p>Regulated scale-ups willing to build the first version with us on their real operation.<\u002Fp>\n          <p>Best fit: EU companies of roughly 30 to 300 people, past the experimental stage, operating under at least one serious framework.<\u002Fp>\n        <\u002Farticle>\n        <article class=\"card partner-card\">\n          <span class=\"num\">02<\u002Fspan>\n          <h3>Advisors<\u002Fh3>\n          <p>QA/RA leaders, auditors, and regulatory experts who will share current frustrations so they can become features.<\u002Fp>\n          <p>Especially useful: people who have lived inside ISO 13485, MDR, AI governance, audit readiness, or post-market quality operations.<\u002Fp>\n        <\u002Farticle>\n      <\u002Fdiv>\n      <div class=\"standard-note work-standards\">\n        <b>Regulated means specific.<\u002Fb> We are designing for environments shaped by ISO 13485, MDR, the EU AI Act, DORA, NIS2, ISO 27001, GDPR, and adjacent operating frameworks.\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"section dark\">\n    <div class=\"container\">\n      <div class=\"section-mark\">\n        <span class=\"label\">Where we are<\u002Fspan>\n        <span class=\"desc\">Precise status, without pretending the product is already shipped.<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"split\">\n        <h2>Specified, not shipped. Building now.<\u002Fh2>\n        <div class=\"copy\">\n          <p>We have been working on the architecture, the risk model, and the traceability before writing product code, because this is software for environments where shortcuts become invisible risk.<\u002Fp>\n          <p>It is early, and that is why we are posting. If your operation looks like the one at the top of this page, or you have spent a career inside ISO 13485, MDR, or AI governance, we would like to talk. Tell us what is broken, missing, or frustrating in the way regulated work runs today.<\u002Fp>\n          <div class=\"btn-row\">\n            <a class=\"btn-primary\" href=\"mailto:hello@niavicta.com?subject=Working%20with%20Niavicta%20on%20nianav%20OS\">hello@niavicta.com <span class=\"arrow\"><\u002Fspan><\u002Fa>\n            <a class=\"btn-ghost\" href=\"niavicta-os.html\">Read about nianav OS<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n<footer class=\"foot\">\n  <div class=\"container row\">\n    <span>Niavicta · Utrecht, NL<\u002Fspan>\n    <span><a href=\"privacy-policy.html\">Privacy policy<\u002Fa> · © 2026 · nianav OS<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n<script src=\"aefd3053-744b-496e-9470-7722e6312847\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
