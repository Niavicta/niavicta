<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niavicta LinkedIn Cover</title>
<link rel="stylesheet" href="../styles.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1584px;
    height: 396px;
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    background: #0e2240;
  }

  .cover {
    width: 1584px;
    height: 396px;
    background: #0e2240;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(79,179,162,0.12) 1px, transparent 1px);
    background-size: 36px 36px;
    z-index: 0;
  }

  .glow-tr {
    position: absolute;
    top: -120px;
    right: -80px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(79,179,162,0.18) 0%, transparent 65%);
    z-index: 0;
  }

  .glow-bl {
    position: absolute;
    bottom: -120px;
    left: 100px;
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, rgba(214,162,76,0.08) 0%, transparent 65%);
    z-index: 0;
  }

  .bottom-strip {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(to right, #4FB3A2, #1F3A5F 60%, #D6A24C);
    z-index: 3;
  }

  /* Content pushed right to clear LinkedIn profile pic (~420px) then spreads to fill banner */
  .content {
    position: relative;
    z-index: 2;
    padding-left: 420px;
    padding-right: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    width: 100%;
  }

  .headline {
    font-family: 'DM Sans', sans-serif;
    font-size: 62px;
    font-weight: 600;
    line-height: 1.1;
    color: #ffffff;
    margin-bottom: 20px;
    letter-spacing: -0.02em;
    white-space: nowrap;
  }

  .headline .accent {
    color: #4FB3A2;
  }

  .tagline {
    font-size: 31px;
    color: rgba(230,235,240,0.65);
    font-weight: 400;
    letter-spacing: 0.01em;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="cover">

  <div class="bg-grid"></div>
  <div class="glow-tr"></div>
  <div class="glow-bl"></div>
  <div class="bottom-strip"></div>

  <div class="content">
    <div class="headline">
      Win with intent.<br>Keep winning <span class="accent">by design</span>.
    </div>
    <div class="tagline">We help ambitious, scaling companies build operational systems that work.</div>
  </div>

</div>
</body>
</html>
